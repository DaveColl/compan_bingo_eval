<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#2563b8">
    <title>Kollegen Bingo – Bewertung</title>
    <link rel="stylesheet" href="style.css?v=1.5">
</head>
<body>

    <!-- SCREEN 1: Setup -->
    <div id="setupScreen" class="screen active">
        <div class="container">
            <h1>🎯 Bingo Bewertung</h1>
            <p class="subtitle">Tragt alle Gruppen ein, um die Bewertung zu starten.</p>
            <div id="groupList"></div>
            <button id="addGroupBtn" class="btn btn-secondary">➕ Gruppe hinzufügen</button>
            <button id="startBtn" class="btn btn-primary" disabled>🏁 Bewertung Starten</button>
        </div>
    </div>

    <!-- SCREEN 2: Scoring -->
    <div id="scoringScreen" class="screen">
        <div class="container">
            <div class="scoring-header">
                <h1>🎯 Bingo Bewertung</h1>
                <button id="resetBtn" class="btn-icon" title="Neu starten">🔄</button>
            </div>

            <div class="leaderboard">
                <h2>🏆 Rangliste</h2>
                <div id="leaderboardList"></div>
            </div>

            <div class="points-info">
                <span>📌 1 Pt. pro Feld</span>
                <span>➕ 1 Bonus pro Reihe</span>
                <span>➕ 1 Bonus pro Spalte</span>
                <span>➕ 1 Bonus pro Diagonale</span>
            </div>

            <div id="groupsScoring"></div>
        </div>
    </div>

    <script src="app.js?v=1.5"></script>
</body>
</html>
